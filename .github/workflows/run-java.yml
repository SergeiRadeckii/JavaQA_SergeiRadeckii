name: Build and Run Java (manual input)

on:
  workflow_dispatch:
    inputs:
      a:
        description: 'Целое число a'
        required: true
        default: '5'
      b:
        description: 'Целое число b'
        required: true
        default: '3'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile
        run: javac -d out src/Main.java

      - name: Run with inputs
        run: |
          # подаём два числа в stdin (каждое с новой строки)
          echo -e "${{ github.event.inputs.a }}\n${{ github.event.inputs.b }}" | java -cp out Main
